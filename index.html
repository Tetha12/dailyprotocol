// ─── Sync ─────────────────────────────────────────────────
const safeObj=v=>(v&&typeof v==='object'&&!Array.isArray(v))?v:{};
const useSync=(key,def,uid)=>{
  const[val,setVal]=useState(def); const[ready,setReady]=useState(false);
  const timer=useRef(null); const defRef=useRef(def);
  useEffect(()=>{if(!uid||!window.firebaseModules)return;const{doc,onSnapshot}=window.firebaseModules;const ref=doc(getDB(),'friday_users',uid,'data',key);const unsub=onSnapshot(ref,snap=>{setVal(snap.exists()&&snap.data().val!=null?snap.data().val:defRef.current);setReady(true);},(()=>{setVal(defRef.current);setReady(true);}));return()=>unsub();},[uid,key]);
  const save=useCallback(v=>{if(timer.current)clearTimeout(timer.current);timer.current=setTimeout(async()=>{if(!uid||!window.firebaseModules)return;try{const{doc,setDoc}=window.firebaseModules;await setDoc(doc(getDB(),'friday_users',uid,'data',key),{val:v},{merge:true});}catch(e){}},800);},[uid,key]);
  const set=useCallback(upd=>{setVal(prev=>{const sp=prev!=null?prev:defRef.current;const next=typeof upd==='function'?upd(sp):upd;save(next);return next;});},[save]);
  return[val,set,ready];
};

// ─── Auth ─────────────────────────────────────────────────
const AuthGate=({onLogin})=>{
  const[u,setU]=useState('');const[loading,setLoading]=useState(false);const[err,setErr]=useState('');
  const submit=async e=>{
    e.preventDefault();const id=u.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
    if(!id||id.length<3)return setErr('Minimal 3 karakter.');
    setLoading(true);setErr('');
    try{if(!window.firebaseModules)await new Promise(r=>window.addEventListener('firebaseReady',r,{once:true}));const db=getDB();const{doc,getDoc,setDoc}=window.firebaseModules;const ref=doc(db,'friday_users',id);const snap=await getDoc(ref);if(!snap.exists())await setDoc(ref,{username:id,createdAt:new Date().toISOString()});onLogin(id);}
    catch{setErr('Gagal terhubung.');}finally{setLoading(false);}
  };
  return(
    <div className="auth-wrap"><div className="auth-box fade-up">
      <div className="auth-logo"><I n="monk" size={20}/></div>
      <h1 className="auth-h1">Monk Mode</h1>
      <p className="auth-tagline">80 Day Discipline Protocol — 24 Apr → 13 Jul 2026</p>
      <div className="auth-form">
        {err&&<div style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:8,padding:'9px 12px',fontSize:13,color:'var(--red)'}}>{err}</div>}
        <div><span className="label">Username</span><input value={u} onChange={e=>setU(e.target.value.replace(/[^a-zA-Z0-9_]/g,''))} className="inp mono" placeholder="nama_kamu" maxLength={30} autoCapitalize="none" autoComplete="off"/></div>
        <button className="btn btn-blue btn-lg" style={{width:'100%'}} onClick={submit} disabled={loading||u.length<3}>
          {loading?<span className="spin-it"><I n="loader"/></span>:<I n="monk"/>}{loading?'Menghubungkan...':'Masuk'}
        </button>
      </div>
    </div></div>
  );
};

            {mob&&<button className="btn btn-ghost" style={{padding:'7px 10px'}} onClick={()=>setUid(null)}><I n="logout"/></button>}
          </div>
        </div>

        <div className="page">
          {tab==='dashboard'&&<DashPage dayN={dayN} pct={pct} weight={weight} fp={fp} nfStreak={nfStreak} njStreak={njStreak} todayM={todayM} safeRprog={safeRprog} toggleRprog={toggleRprog} codeDone={codeDone} allVids={allVids} setTab={setTab} ws={ws} priEx={priEx} isExDone={isExDone} toggleEx={toggleEx} dayName={dayName} safeDiary={safeDiary} safeHL={safeHL} setHabitLog={setHabitLog} dateKey={dateKey}/>}
          {tab==='habits'&&<HabitsPage habitLog={safeHL} setHabitLog={setHabitLog} today={today} dateKey={dateKey} fmtDate={fmtDate}/>}
          {tab==='streak'&&<StreakPage streakNF={safeNF} setStreakNF={setStreakNF} streakNJ={safeNJ} setStreakNJ={setStreakNJ} today={today} nfStreak={nfStreak} njStreak={njStreak}/>}
          {tab==='diary'&&<DiaryPage diary={safeDiary} setDiary={setDiary} dateKey={dateKey} fmtDate={fmtDate}/>}
          {tab==='fitness'&&<FitnessPage safeWO={safeWO} setWorkout={setWorkout} dayName={dayName} dateKey={dateKey} safeExDone={safeExDone} setExDone={setExDone} ws={ws} fp={fp} priEx={priEx} isExDone={isExDone} toggleEx={toggleEx}/>}
          {tab==='roadmap'&&<RoadmapPage safeRM={safeRM} setRoadmap={setRoadmap} safeRprog={safeRprog} toggleRprog={toggleRprog} roadPhase={roadPhase} setRoadPhase={setRoadPhase} setSettTab={setSettTab} setSettOpen={setSettOpen}/>}
          {tab==='library'&&<LibraryPage safeLib={safeLib} setLibrary={setLibrary} bookEdit={bookEdit} setBookEdit={setBookEdit} bookLog={bookLog} setBookLog={setBookLog}/>}
        </div>
      </div>

      {mob&&(<nav className="mobnav">{NAV.map(n=><button key={n.id} className={`mobbtn${tab===n.id?' on':''}`} onClick={()=>setTab(n.id)}><I n={n.n} size={20}/>{n.l.split(' ')[0]}</button>)}</nav>)}

      {/* Timeline modal */}
      <Modal open={calOpen} onClose={()=>setCalOpen(false)} title="Timeline — 80 Hari">
        <div style={{marginBottom:14,display:'flex',gap:12,fontSize:12,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace',flexWrap:'wrap'}}>
          <span>Mulai: <b style={{color:'var(--text)'}}>24 Apr 2026</b></span>
          <span>Selesai: <b style={{color:'var(--text)'}}>{end.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}</b></span>
          <span>Hari ini: <b style={{color:'var(--blue-hover)'}}>Day {dayN}</b></span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(10,1fr)',gap:5}}>
          {Array.from({length:TOTAL}).map((_,i)=>{const d=i+1,past=d<dayN,cur=d===dayN;const dt=new Date(START);dt.setDate(START.getDate()+i);
            return<div key={i} title={`Day ${d} — ${dt.toLocaleDateString('id-ID',{day:'numeric',month:'short'})}`} style={{aspectRatio:'1',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,fontFamily:'JetBrains Mono,monospace',background:cur?'var(--blue)':past?'rgba(59,130,246,0.18)':'var(--surface2)',color:cur?'#fff':past?'var(--blue-hover)':'var(--text3)',outline:cur?'2px solid var(--blue-hover)':'none',outlineOffset:1}}>{d}</div>;
          })}
        </div>
      </Modal>

      {/* Weight modal */}
      <Modal open={wtOpen} onClose={()=>setWtOpen(false)} title="Berat Badan">
        <div style={{marginBottom:16}}>
          <div style={{fontSize:42,fontWeight:800,color:'var(--text)',lineHeight:1,marginBottom:6}}>{weight.current} <span style={{fontSize:16,color:'var(--text2)',fontWeight:400}}>kg</span></div>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:10,fontFamily:'JetBrains Mono,monospace'}}>Target {weight.target}kg — sudah turun {(weight.start-weight.current).toFixed(1)}kg dari {weight.start}kg</div>
          <PBar cur={weight.start-weight.current} tot={weight.start-weight.target} cls="g"/>
        </div>
        <form onSubmit={e=>{e.preventDefault();setWeight(p=>({...p,current:parseFloat(e.target.w.value)}));setWtOpen(false);}} style={{display:'flex',gap:10}}>
          <input name="w" type="number" step="0.1" placeholder={weight.current} className="inp" style={{flex:1}} required/>
          <button className="btn btn-blue" type="submit">Simpan</button>
        </form>
      </Modal>

      <SettingsModal open={settOpen} onClose={()=>setSettOpen(false)} tab={settTab} setTab={setSettTab}
        roadmap={safeRM} setRoadmap={setRoadmap} workout={safeWO} setWorkout={setWorkout}
        setRprog={setRprog} setExDone={setExDone} setHabitLog={setHabitLog}
        setStreakNF={setStreakNF} setStreakNJ={setStreakNJ} setDiary={setDiary}/>
    </div>
  );
};

// ─── Dashboard ────────────────────────────────────────────
const DashPage=({dayN,pct,weight,fp,nfStreak,njStreak,todayM,safeRprog,toggleRprog,codeDone,allVids,setTab,ws,priEx,isExDone,toggleEx,dayName,safeDiary,safeHL,setHabitLog,dateKey})=>{
  const lastEntry=safeDiary.length>0?safeDiary[safeDiary.length-1]:null;
  const todayHabits=safeObj(safeHL[dateKey]);
  const habitDone=HABITS.filter(h=>todayHabits[h.id]).length;
  const toggleH=id=>setHabitLog(p=>{const s=safeObj(p);const d=safeObj(s[dateKey]);return{...s,[dateKey]:{...d,[id]:!d[id]}};});

  return(
    <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div className="grid4">

          <div key={s.l} className="card card-p"><div style={{fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>{s.l}</div><div style={{fontSize:24,fontWeight:800,color:s.c,letterSpacing:'-0.02em',lineHeight:1}}>{s.v}</div></div>
        ))}
      </div>

      <div className="card card-p">
        <div className="between" style={{marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:600,color:'var(--text2)'}}>80 Hari Monk Mode — Day {dayN}</span>
          <span style={{fontSize:15,fontWeight:800,color:'var(--blue-hover)'}}>{pct}%</span>
        </div>
        <PBar cur={dayN} tot={TOTAL}/>
      </div>

      <div className="grid2">
        {/* Habits today */}
        <div className="card" style={{display:'flex',flexDirection:'column',gap:10}}>
          <div className="between">
            <div><div style={{fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:3}}>Daily Activity</div><div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>Habits Hari Ini</div></div>
            <span style={{fontSize:12,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace'}}>{habitDone}/5</span>
          </div>
          {HABITS.map(h=>{const done=!!todayHabits[h.id];return(
            <div key={h.id} className={`habit-card${done?' done':''}`} onClick={()=>toggleH(h.id)} style={{borderColor:done?h.color+'40':'var(--border)',background:done?h.color+'10':'var(--surface2)'}}>
              <div className="habit-check" style={{borderColor:done?h.color:'var(--text3)',background:done?h.color:'transparent'}}>{done&&<I n="check" size={10}/>}</div>
              <span style={{fontSize:13,fontWeight:600,color:done?h.color:'var(--text2)',flex:1}}>{h.emoji} {h.label}</span>
              {done&&<span style={{fontSize:10,color:h.color,fontFamily:'JetBrains Mono,monospace',fontWeight:700}}>✓</span>}
            </div>
          );})}
          <PBar cur={habitDone} tot={5} cls="g"/>
          <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>{}}>Lihat Detail →</button>
        </div>

        {/* Fitness today */}
        <div className="card" style={{display:'flex',flexDirection:'column',gap:12}}>
          <div className="between">
            <div><div style={{fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:3}}>{ws.type}</div><div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{dayName} — {ws.focus}</div></div>
            <span style={{fontSize:12,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace'}}>{fp.done}/{fp.total}</span>
          </div>
          {priEx.slice(0,4).map((ex,i)=>{const done=isExDone(ex);return(
            <div key={i} className={`ex-card${done?' done':''}`} onClick={()=>toggleEx(ex)}>
              <div className="ex-num">{done?<I n="check" size={13}/>:i+1}</div>
              <div><div className="ex-title">{ex.name}</div><div className="ex-meta">{ex.detail}</div></div>
            </div>);
          })}
          <PBar cur={fp.done} tot={fp.total}/>
        </div>
      </div>

      {/* Coding missions */}
      <div className="card" style={{display:'flex',flexDirection:'column',gap:12}}>
        <div className="between">
          <div><div style={{fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:3}}>Python Data Analytics — Day {dayN}</div><div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>Target Coding Hari Ini</div></div>
          <span style={{fontSize:12,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace'}}>{codeDone}/{allVids.length}</span>
        </div>
        {todayM.length===0&&<div style={{fontSize:13,color:'var(--text2)',padding:'8px 0'}}>Target hari ini sudah selesai. 🎉</div>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {todayM.map(m=>{const done=safeRprog[m.id];return(
            <div key={m.id} style={{display:'flex',gap:10,padding:'11px 13px',borderRadius:9,border:`1px solid ${done?'var(--blue-border)':'var(--border)'}`,background:done?'rgba(59,130,246,0.05)':'var(--surface2)',transition:'all 0.2s'}}>
              <div onClick={()=>toggleRprog(m.id)} style={{width:17,height:17,borderRadius:4,border:`2px solid ${done?'var(--blue)':'var(--text3)'}`,background:done?'var(--blue)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer',marginTop:1}}>{done&&<I n="check" size={9}/>}</div>
              <div style={{flex:1}}><div style={{display:'flex',gap:5,marginBottom:4}}><span className={`tag ${m.type==='video'?'tag-blue':'tag-dim'}`}>{m.type==='video'?'Video':'Case'}</span></div><div style={{fontSize:13,fontWeight:600,color:done?'var(--text2)':'var(--text)',textDecoration:done?'line-through':'none',lineHeight:1.4}}>{m.title}</div>{m.url&&<a href={m.url} target="_blank" rel="noopener" style={{fontSize:11,color:'var(--blue-hover)',marginTop:3,display:'inline-flex',alignItems:'center',gap:4,textDecoration:'none',fontFamily:'JetBrains Mono,monospace'}} onClick={e=>e.stopPropagation()}><I n="ext" size={10}/> Buka</a>}</div>
            </div>);})}
        </div>
      </div>

      {lastEntry&&(
        <div className="card card-p" style={{cursor:'pointer'}} onClick={()=>{}}>
          <div className="between" style={{marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Entri Diary Terakhir</span>
            <span style={{fontSize:11,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace'}}>{lastEntry.date}</span>
          </div>
          <div style={{fontSize:14,color:'var(--text)',lineHeight:1.65,fontFamily:'Instrument Serif,serif',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{lastEntry.text}</div>
        </div>
      )}
    </div>
  );
};

// ─── Habits Page ──────────────────────────────────────────
const HabitsPage=({habitLog,setHabitLog,today,dateKey,fmtDate})=>{
  const[view,setView]=useState('today');
  const[selHabit,setSelHabit]=useState('nofap');
  const[calMonth,setCalMonth]=useState({y:today.getFullYear(),m:today.getMonth()});

  const safeLog=safeObj(habitLog);
  const todayData=safeObj(safeLog[dateKey]);
  const doneTodayCount=HABITS.filter(h=>todayData[h.id]).length;

  const toggleH=id=>setHabitLog(p=>{const s=safeObj(p);const d=safeObj(s[dateKey]);return{...s,[dateKey]:{...d,[id]:!d[id]}};});

  const getStreak=hid=>{let n=0;const d=new Date(today);while(true){const k=d.toISOString().split('T')[0];if(!safeLog[k]?.[hid])break;n++;d.setDate(d.getDate()-1);}return n;};

  const getRate=(hid,days=30)=>{let c=0;for(let i=0;i<days;i++){const d=new Date(today);d.setDate(today.getDate()-i);const k=d.toISOString().split('T')[0];if(safeLog[k]?.[hid])c++;}return Math.round((c/days)*100);};

  const last30=useMemo(()=>Array.from({length:30},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-29+i);const k=d.toISOString().split('T')[0];const data=safeLog[k]||{};return{key:k,date:d,count:HABITS.filter(h=>data[h.id]).length,habits:data};}),[safeLog,today]);

  const activeHabit=HABITS.find(h=>h.id===selHabit);

  return(
    <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* Header */}
      <div className="between" style={{flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:'var(--text)',letterSpacing:'-0.02em',marginBottom:2}}>Daily Activity</div>
          <div style={{fontSize:12,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace'}}>{fmtDate} — {doneTodayCount}/5 selesai hari ini</div>
        </div>
        <div style={{display:'flex',gap:0,background:'var(--surface2)',borderRadius:9,border:'1px solid var(--border)',overflow:'hidden'}}>
          {[{id:'today',l:'Hari Ini'},{id:'calendar',l:'Kalender'},{id:'chart',l:'Grafik'}].map((v,vi)=>(
            <button key={v.id} onClick={()=>setView(v.id)} style={{padding:'8px 14px',border:'none',borderRight:vi<2?'1px solid var(--border)':'none',background:view===v.id?'var(--blue-dim)':'transparent',color:view===v.id?'var(--blue-hover)':'var(--text2)',fontWeight:600,fontSize:13,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',transition:'all 0.15s'}}>{v.l}</button>
          ))}
        </div>
      </div>

      {/* Today view */}
      {view==='today'&&(
        <div style={{maxWidth:560,display:'flex',flexDirection:'column',gap:12}}>
          <div className="card card-p">
            <div className="between" style={{marginBottom:14}}>
              <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>Checklist Hari Ini</div>
              <div style={{textAlign:'center'}}><div style={{fontSize:40,fontWeight:800,color:'var(--text)',lineHeight:1}}>{doneTodayCount}</div><div style={{fontSize:11,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace'}}>/ 5</div></div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
              {HABITS.map(h=>{const done=!!todayData[h.id];return(
                <div key={h.id} className={`habit-card${done?' done':''}`} onClick={()=>toggleH(h.id)} style={{borderColor:done?h.color+'50':'var(--border)',background:done?h.color+'12':'var(--surface2)'}}>
                  <div className="habit-check" style={{borderColor:done?h.color:'var(--text3)',background:done?h.color:'transparent',width:22,height:22}}>{done&&<I n="check" size={11}/>}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700,color:done?h.color:'var(--text)'}}>{h.emoji} {h.label}</div>
                    <div style={{fontSize:11,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace',marginTop:1}}>Streak: {getStreak(h.id)} hari · {getRate(h.id)}% (30h)</div>
                  </div>
                  {done&&<div style={{fontSize:18}}>✅</div>}
                </div>
              );})}
            </div>
            <PBar cur={doneTodayCount} tot={5} cls="g"/>
            {doneTodayCount===5&&<div style={{textAlign:'center',marginTop:12,fontSize:14,color:'var(--green)',fontWeight:700}}>🔥 Perfect Day! Semua selesai!</div>}
          </div>

          {/* Per-habit stats */}
          <div className="grid2">
            {HABITS.map(h=>{const streak=getStreak(h.id);const rate=getRate(h.id);return(
              <div key={h.id} className="card card-p" style={{cursor:'pointer',borderColor:todayData[h.id]?h.color+'30':'var(--border)'}} onClick={()=>{setSelHabit(h.id);setView('calendar');}}>
                <div style={{fontSize:22,marginBottom:6}}>{h.emoji}</div>
                <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:2}}>{h.label}</div>
                <div style={{fontSize:11,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace',marginBottom:8}}>Streak: <b style={{color:h.color}}>{streak} hari</b></div>
                <div style={{height:4,background:'var(--surface3)',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:`${rate}%`,background:h.color,borderRadius:99,transition:'width 0.7s ease'}}/></div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:4,fontFamily:'JetBrains Mono,monospace'}}>{rate}% · 30 hari</div>
              </div>
            );})}
          </div>
        </div>
      )}

      {/* Calendar view */}
      {view==='calendar'&&(
        <div style={{display:'flex',flexDirection:'column',gap:14,maxWidth:680}}>
          {/* Habit tabs */}
          <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4}}>
            {HABITS.map(h=>(
              <button key={h.id} onClick={()=>setSelHabit(h.id)} style={{padding:'7px 14px',borderRadius:8,border:`1px solid ${selHabit===h.id?h.color+'50':'var(--border)'}`,background:selHabit===h.id?h.color+'15':'var(--surface2)',color:selHabit===h.id?h.color:'var(--text2)',fontWeight:600,fontSize:13,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',transition:'all 0.15s',flexShrink:0,whiteSpace:'nowrap'}}>
                {h.emoji} {h.label}
              </button>
            ))}
          </div>

          {/* Month nav */}
          <div className="between">
            <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{new Date(calMonth.y,calMonth.m,1).toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn btn-ghost" style={{padding:'7px 10px'}} onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};})}><I n="chL"/></button>
              <button className="btn btn-ghost" style={{padding:'7px 10px',fontSize:12}} onClick={()=>setCalMonth({y:today.getFullYear(),m:today.getMonth()})}>Hari Ini</button>
              <button className="btn btn-ghost" style={{padding:'7px 10px'}} onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};})}><I n="chR"/></button>
            </div>
          </div>

          {/* Calendar grid */}
          {activeHabit&&(()=>{
            const{y,m}=calMonth;
            const firstDay=new Date(y,m,1).getDay();
            const daysInMonth=new Date(y,m+1,0).getDate();
            const todayKey=today.toISOString().split('T')[0];
            const dayLabels=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
            const cells=[];
            for(let i=0;i<firstDay;i++)cells.push(null);
            for(let d=1;d<=daysInMonth;d++)cells.push(d);
            const doneCount=cells.filter(d=>{if(!d)return false;const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;return!!safeLog[k]?.[activeHabit.id];}).length;
            return(
              <div className="card">
                <div className="between" style={{marginBottom:14}}>
                  <div><div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{activeHabit.emoji} {activeHabit.label}</div><div style={{fontSize:11,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace',marginTop:2}}>{doneCount} hari bersih bulan ini · Streak: {getStreak(activeHabit.id)} hari</div></div>
                  <div style={{fontSize:28,fontWeight:800,color:activeHabit.color}}>{getRate(activeHabit.id,daysInMonth)}%</div>
                </div>
                <div style={{height:4,background:'var(--surface3)',borderRadius:99,overflow:'hidden',marginBottom:16}}><div style={{height:'100%',width:`${getRate(activeHabit.id,daysInMonth)}%`,background:activeHabit.color,borderRadius:99}}/></div>
                <div className="cal-grid" style={{marginBottom:4}}>

                  </div>

                </div>

            </div>
          </div>

          {/* Stacked bar chart - last 30 days */}
          <div className="card">
            <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:4}}>Habits per Hari</div>
            <div style={{fontSize:11,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace',marginBottom:16}}>30 hari terakhir — setiap batang = jumlah habit selesai</div>
            <div style={{overflowX:'auto'}}>
              <svg viewBox="0 0 600 140" style={{width:'100%',minWidth:360,display:'block'}}>
                {/* Grid lines */}
                {[1,2,3,4,5].map(y=>(
                  <g key={y}>
                    <line x1={0} y1={110-(y/5)*110} x2={600} y2={110-(y/5)*110} stroke="rgba(255,255,255,0.04)" strokeWidth={1}/>
                    <text x={594} y={110-(y/5)*110-2} fill="rgba(148,163,184,0.5)" fontSize={7} textAnchor="end" fontFamily="JetBrains Mono,monospace">{y}</text>
                  </g>
                ))}
                {/* Bars */}
                {last30.map((day,i)=>{
                  const bw=14, bx=i*(600/30)+(600/30-bw)/2;

                    {HABITS.map(h=>{
                      if(!day.habits[h.id])return null;
                      const bh=22;yOff-=bh;
                      return<rect key={h.id} x={bx} y={yOff} width={bw} height={bh-1} fill={h.color} rx={2} opacity={0.8}/>;
                    })}
                    {i%5===0&&<text x={bx+bw/2} y={126} fill="rgba(148,163,184,0.6)" fontSize={8} textAnchor="middle" fontFamily="JetBrains Mono,monospace">{day.date.getDate()}/{day.date.getMonth()+1}</text>}
                  </g>;

                  <div style={{width:10,height:10,borderRadius:2,background:h.color,opacity:0.85}}/>

            </div>

          {/* Weekly summary */}
          <div className="card">
            <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:4}}>Ringkasan Minggu Ini</div>
            <div style={{fontSize:11,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace',marginBottom:14}}>7 hari terakhir</div>
            <div className="grid4" style={{gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr'}}>
              {HABITS.map(h=>{
                let c=0;for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()-i);const k=d.toISOString().split('T')[0];if(safeLog[k]?.[h.id])c++;}
                return(
                  <div key={h.id} style={{textAlign:'center',padding:'12px 8px',borderRadius:9,border:`1px solid ${h.color}30`,background:h.color+'10'}}>
                    <div style={{fontSize:22,marginBottom:4}}>{h.emoji}</div>
                    <div style={{fontSize:22,fontWeight:800,color:h.color,lineHeight:1}}>{c}</div>
                    <div style={{fontSize:10,color:'var(--text3)',fontFamily:'JetBrains Mono,monospace'}}>/ 7</div>
                    <div style={{fontSize:10,color:'var(--text2)',marginTop:4,fontWeight:600}}>{h.label.split(' ')[0]}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Streak Page ──────────────────────────────────────────
const StreakPage=({streakNF,setStreakNF,streakNJ,setStreakNJ,today,nfStreak,njStreak})=>{
  const[confirm,setConfirm]=useState(null);
  const[calMonth,setCalMonth]=useState({y:today.getFullYear(),m:today.getMonth()});
  const toggleDay=(setter,obj,dateStr)=>setter(p=>{const s=safeObj(p);return{...s,[dateStr]:!s[dateStr]};});
  const doReset=type=>{if(type==='nf')setStreakNF({});else setStreakNJ({});setConfirm(null);};

  const renderCal=(label,obj,setter,accent,streak)=>{
    const{y,m}=calMonth;const firstDay=new Date(y,m,1).getDay();const daysInMonth=new Date(y,m+1,0).getDate();const todayKey=today.toISOString().split('T')[0];
    const cells=[];for(let i=0;i<firstDay;i++)cells.push(null);for(let d=1;d<=daysInMonth;d++)cells.push(d);
    const dayLabels=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
    return(
      <div className="card" style={{display:'flex',flexDirection:'column',gap:16}}>
        <div className="between">
          <div><div style={{fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:3}}>{label}</div><div style={{fontSize:32,fontWeight:800,color:accent,letterSpacing:'-0.03em',lineHeight:1}}>{streak} <span style={{fontSize:14,color:'var(--text2)',fontWeight:500}}>hari</span></div></div>
          <button className="btn btn-red" style={{fontSize:12}} onClick={()=>setConfirm(label==='NoFap'?'nf':'nj')}>Reset</button>
        </div>
        <PBar cur={streak} tot={80} cls={accent===`var(--blue-hover)`?'':'g'}/>
        <div style={{fontSize:11,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace'}}>{streak}/80 hari — {Math.round((streak/80)*100)}%</div>
        <div><div className="cal-grid" style={{marginBottom:2}}>{dayLabels.map(d=><div key={d} className="cal-day-label">{d}</div>)}</div>
          <div className="cal-grid">{cells.map((d,i)=>{
            if(d===null)return<div key={`e${i}`} className="cal-cell empty"/>;
            const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday=dateStr===todayKey;const isFuture=new Date(y,m,d)>today;const isClean=!!obj[dateStr];
            let cls='cal-cell';if(isFuture)cls+=' future';else if(isClean)cls+=' clean';else cls+=' past-unmarked';if(isToday)cls+=' today-cell';
            return<div key={d} className={cls} title={dateStr} onClick={()=>!isFuture&&toggleDay(setter,obj,dateStr)} style={{outline:isToday?`2px solid ${accent}`:'none',outlineOffset:-1}}>{d}</div>;
          })}</div>
        </div>
        <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.6}}>Klik tanggal untuk menandai hari bersih.</div>
      </div>
    );
  };

  return(
    <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:16,maxWidth:900,margin:'0 auto'}}>
      <div className="between">
        <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{new Date(calMonth.y,calMonth.m,1).toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost" style={{padding:'7px 10px'}} onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};})}><I n="chL"/></button>
          <button className="btn btn-ghost" style={{padding:'7px 10px',fontSize:12}} onClick={()=>setCalMonth({y:today.getFullYear(),m:today.getMonth()})}>Hari Ini</button>
          <button className="btn btn-ghost" style={{padding:'7px 10px'}} onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};})}><I n="chR"/></button>
        </div>
      </div>
      <div className="grid2">
        {renderCal('NoFap',streakNF,setStreakNF,'var(--blue-hover)',nfStreak)}
        {renderCal('No Junkfood',streakNJ,setStreakNJ,'var(--green)',njStreak)}
      </div>
      {confirm&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setConfirm(null)}>
          <div className="modal pop-in" style={{maxWidth:380}}>
            <div className="modal-head"><span className="modal-title">Reset {confirm==='nf'?'NoFap':'No Junkfood'}?</span><button className="icon-btn" onClick={()=>setConfirm(null)}><I n="x"/></button></div>
            <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:16}}>
              <div style={{fontSize:48,fontWeight:800,color:'var(--red)',lineHeight:1,letterSpacing:'-0.03em',textAlign:'center'}}>{confirm==='nf'?nfStreak:njStreak}</div>
              <div style={{fontSize:13,color:'var(--text2)',textAlign:'center',lineHeight:1.6}}>Semua data kalender akan dihapus. Tidak bisa dibatalkan.</div>
              <div style={{display:'flex',gap:10}}><button className="btn btn-ghost" style={{flex:1}} onClick={()=>setConfirm(null)}>Batalkan</button><button className="btn btn-red" style={{flex:1}} onClick={()=>doReset(confirm)}>Reset</button></div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Diary ────────────────────────────────────────────────
const DiaryPage=({diary,setDiary,dateKey,fmtDate})=>{
  const[writing,setWriting]=useState(false);const[text,setText]=useState('');const[mood,setMood]=useState('neutral');const[editId,setEditId]=useState(null);const[showAll,setShowAll]=useState(false);
  const todayEntry=diary.find(e=>e.date===dateKey);
  const openNew=()=>{if(todayEntry){setEditId(todayEntry.id);setText(todayEntry.text);setMood(todayEntry.mood||'neutral');}else{setText('');setMood('neutral');setEditId(null);}setWriting(true);};
  const save=()=>{if(!text.trim())return;if(editId){setDiary(p=>Array.isArray(p)?p.map(e=>e.id===editId?{...e,text:text.trim(),mood}:e):[]);}else{const entry={id:Date.now(),date:dateKey,dateLabel:fmtDate,text:text.trim(),mood};setDiary(p=>Array.isArray(p)?[...p,entry]:[entry]);}setWriting(false);setText('');setEditId(null);};
  const deleteEntry=id=>{if(!confirm('Hapus entri ini?'))return;setDiary(p=>Array.isArray(p)?p.filter(e=>e.id!==id):[]);};
  const sorted=[...diary].reverse();const visible=showAll?sorted:sorted.slice(0,10);

    <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:16,maxWidth:700,margin:'0 auto'}}>
      <div className="between">
        <div><div style={{fontSize:20,fontWeight:800,color:'var(--text)',letterSpacing:'-0.02em',marginBottom:2}}>Diary</div><div style={{fontSize:12,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace'}}>{diary.length} entri</div></div>
        <button className="btn btn-blue" onClick={openNew}><I n="pencil"/>{todayEntry?'Edit Hari Ini':'Tulis Hari Ini'}</button>
      </div>
      {!todayEntry&&<div style={{padding:'20px',borderRadius:'var(--radius)',border:'1px dashed var(--border2)',background:'var(--surface2)',textAlign:'center'}}><div style={{fontSize:14,color:'var(--text2)',marginBottom:8}}>Belum ada entri untuk hari ini.</div><button className="btn btn-blue" onClick={openNew}><I n="pencil"/>Tulis Sekarang</button></div>}
      {visible.map(e=>(
        <div key={e.id} className="diary-entry">
          <div className="between" style={{marginBottom:8}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><span className="diary-date">{e.dateLabel||e.date}</span>{e.date===dateKey&&<span className="tag tag-blue">Hari ini</span>}</div>
            <div style={{display:'flex',gap:6}}><button className="icon-btn" onClick={()=>{setEditId(e.id);setText(e.text);setMood(e.mood||'neutral');setWriting(true);}}><I n="pencil"/></button><button className="icon-btn red" onClick={()=>deleteEntry(e.id)}><I n="trash"/></button></div>
          </div>
          <div className="diary-text">{e.text}</div>
          {e.mood&&<div style={{display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:5,fontSize:11,fontWeight:600,marginTop:10,background:`${moodColors[e.mood]}18`,color:moodColors[e.mood],border:`1px solid ${moodColors[e.mood]}30`}}>{moodLabel[e.mood]}</div>}
        </div>
      ))}
      {diary.length>10&&!showAll&&<button className="btn btn-ghost" onClick={()=>setShowAll(true)}>Tampilkan {diary.length-10} entri lainnya</button>}
      <Modal open={writing} onClose={()=>setWriting(false)} title={editId?'Edit Entri':'Tulis Diary'}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{fontSize:12,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace'}}>{fmtDate}</div>
          <textarea className="inp" style={{minHeight:180,fontSize:14,lineHeight:1.75,fontFamily:'Instrument Serif,serif',background:'var(--bg)',borderColor:'var(--border2)'}} placeholder="Tulis refleksi, perasaan, atau apapun yang ingin kamu catat hari ini..." value={text} onChange={e=>setText(e.target.value)} autoFocus/>
          <div><span className="label" style={{marginBottom:8}}>Mood hari ini</span><div style={{display:'flex',gap:8}}>{MOODS.map(m=>(<button key={m.key} onClick={()=>setMood(m.key)} style={{flex:1,padding:'9px',borderRadius:8,border:`1px solid ${mood===m.key?m.color+'50':'var(--border)'}`,background:mood===m.key?m.color+'15':'var(--surface2)',color:mood===m.key?m.color:'var(--text2)',fontWeight:600,fontSize:13,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',transition:'all 0.15s'}}>{m.label}</button>))}</div></div>
          <div style={{display:'flex',gap:10,marginTop:4}}><button className="btn btn-ghost" style={{flex:1}} onClick={()=>setWriting(false)}>Batal</button><button className="btn btn-blue" style={{flex:2}} onClick={save} disabled={!text.trim()}>Simpan</button></div>
        </div>
      </Modal>
    </div>
  );
};

// ─── Fitness ──────────────────────────────────────────────
const FitnessPage=({safeWO,setWorkout,dayName,dateKey,safeExDone,setExDone,ws,fp,priEx,isExDone,toggleEx})=>{

            {SCAPULAR.map((ex,i)=>{const done=isExDone(ex);return(<div key={i} className={`ex-card${done?' done':''}`} style={{borderLeftColor:'var(--green)',cursor:'pointer'}} onClick={()=>toggleEx(ex)}>

              <div className="ex-num">{isDoneFor(selDay,ex)?<I n="check" size={12}/>:i+1}</div>

              <button className="icon-btn" onClick={e=>{e.stopPropagation();setEditEx({isNew:false,dayKey:selDay,index:i,...ex});}}><I n="pencil"/></button>
              <button className="icon-btn red" onClick={e=>{e.stopPropagation();deleteEx(selDay,i);}}><I n="trash"/></button>
            </div>))}
            <div className="sep"><div className="sep-line"/><div className="sep-label">Scapular — Terkunci</div><div className="sep-line"/></div>

              <div className="ex-num" style={{borderColor:'rgba(34,197,94,0.3)',background:'var(--green-dim)',color:'var(--green)'}}>{isDoneFor(selDay,ex)?<I n="check" size={12}/>:i+1}</div>
              <div style={{flex:1,minWidth:0}}><div className="ex-title">{ex.name}</div><div className="ex-meta">{ex.detail}</div></div>
            </div>))}

        </div>

        {editEx&&<ExForm init={editEx} onSave={saveEx} onClose={()=>setEditEx(null)}/>}

};
const ExForm=({init,onSave,onClose})=>{

// ─── Roadmap ──────────────────────────────────────────────
const RoadmapPage=({safeRM,setRoadmap,safeRprog,toggleRprog,roadPhase,setRoadPhase,setSettTab,setSettOpen})=>{

                  {pvids.map((v,i)=>{const done=safeRprog[v.id];return(
                    <div key={v.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:8,border:`1px solid ${done?'var(--blue-border)':'var(--border)'}`,background:done?'var(--blue-dim)':'var(--surface2)',cursor:'pointer',opacity:done?0.7:1,transition:'all 0.15s'}} onClick={()=>toggleRprog(v.id)}>

                      <div style={{flex:1,fontSize:13,fontWeight:600,color:done?'var(--text2)':'var(--text)',textDecoration:done?'line-through':'none'}}>{i+1}. {v.title}</div>
                      {v.url&&<a href={v.url} target="_blank" rel="noopener" className="icon-btn" onClick={e=>e.stopPropagation()} style={{flexShrink:0}}><I n="play"/></a>}
                    </div>

                    {pcases.map(cs=>{const done=safeRprog[cs.id];return(

                        <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${done?'var(--blue)':'var(--text3)'}`,background:done?'var(--blue)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>{done&&<I n="check" size={9}/>}</div>
                        <div><div style={{fontSize:13,fontWeight:600,color:done?'var(--text2)':'var(--text)',textDecoration:done?'line-through':'none',marginBottom:2}}>{cs.title}</div><div style={{fontSize:11,color:'var(--text2)'}}>{cs.desc}</div></div>
                      </div>
                    );})}
                  </div>
                </div>

            </div>
          );
        })()}
      </Modal>
    </div>
  );

// ─── Roadmap Manager (Enhanced) ───────────────────────────
const RoadmapMgr=({roadmap,setRoadmap})=>{
  const[sel,setSel]=useState(null);
  const[editPhase,setEditPhase]=useState(null);
  const[editItem,setEditItem]=useState(null);
  const safeRM=Array.isArray(roadmap)?roadmap:DEFAULT_ROADMAP;
  const phase=safeRM.find(p=>p.id===sel);

  const savePhase=d=>{
    if(d.isNew){const np={id:`ph_${Date.now()}`,title:d.title,week:d.week,desc:d.desc,color:d.color||'#3b82f6',pl:d.pl,videos:[],casestudies:[]};setRoadmap(p=>{const s=Array.isArray(p)?p:DEFAULT_ROADMAP;return[...s,np];});}
    else{setRoadmap(p=>{const s=Array.isArray(p)?p:DEFAULT_ROADMAP;return s.map(x=>x.id===d.id?{...x,...d}:x);});}
    setEditPhase(null);
  };
  const delPhase=id=>{if(!confirm('Hapus modul ini?'))return;setRoadmap(p=>{const s=Array.isArray(p)?p:DEFAULT_ROADMAP;return s.filter(x=>x.id!==id);});if(sel===id)setSel(null);};

  const saveItem=data=>{
    setRoadmap(p=>{
      const s=Array.isArray(p)?p:DEFAULT_ROADMAP;
      return s.map(ph=>{
        if(ph.id!==sel)return ph;
        const key=data.type==='video'?'videos':'casestudies';
        const list=[...(ph[key]||[])];
        const item=data.type==='video'
          ?{id:data.id||`v_${Date.now()}`,title:data.title,url:data.url||''}
          :{id:data.id||`cs_${Date.now()}`,title:data.title,desc:data.desc||''};
        if(data.isNew)list.push(item);else list[data.index]=item;
        return{...ph,[key]:list};
      });
    });
    setEditItem(null);
  };
  const delItem=(type,index)=>{
    if(!confirm('Hapus item ini?'))return;
    setRoadmap(p=>{
      const s=Array.isArray(p)?p:DEFAULT_ROADMAP;
      return s.map(ph=>{
        if(ph.id!==sel)return ph;
        const key=type==='video'?'videos':'casestudies';
        const list=[...(ph[key]||[])];list.splice(index,1);
        return{...ph,[key]:list};
      });
    });
  };

  return(
    <div style={{display:'grid',gridTemplateColumns:sel?'200px 1fr':'1fr',gap:14,minHeight:320}}>
      {/* Phase list */}
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        <div className="between" style={{marginBottom:4}}>
          <span style={{fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Modul</span>
          <button className="btn btn-ghost" style={{padding:'4px 9px',fontSize:11}} onClick={()=>setEditPhase({isNew:true,title:'',week:'',desc:'',color:'#3b82f6',pl:''})}>+ Tambah</button>
        </div>
        {safeRM.map((p,i)=>(
          <div key={p.id} onClick={()=>setSel(p.id===sel?null:p.id)} style={{padding:'9px 11px',borderRadius:8,border:`1px solid ${sel===p.id?'var(--blue-border)':'var(--border)'}`,background:sel===p.id?'var(--blue-dim)':'var(--surface2)',cursor:'pointer',display:'flex',alignItems:'center',gap:9,transition:'all 0.15s'}}>
            <div style={{width:24,height:24,borderRadius:6,background:`${p.color||'#3b82f6'}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:p.color||'#3b82f6',flexShrink:0}}>{i+1}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</div><div style={{fontSize:10,color:'var(--text3)',fontFamily:'JetBrains Mono,monospace'}}>{(p.videos||[]).length}v · {(p.casestudies||[]).length}cs</div></div>
            <button className="icon-btn" style={{width:24,height:24,flexShrink:0}} onClick={e=>{e.stopPropagation();setEditPhase({...p});}}><I n="pencil"/></button>
          </div>
        ))}
      </div>

      {/* Phase detail */}
      {sel&&phase&&(
        <div style={{display:'flex',flexDirection:'column',gap:12,overflowY:'auto',maxHeight:420}}>
          <div className="between">
            <div><div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{phase.title}</div><div style={{fontSize:11,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace',marginTop:2}}>Week {phase.week}</div></div>
            <div style={{display:'flex',gap:6}}>
              <button className="icon-btn red" onClick={()=>delPhase(phase.id)}><I n="trash"/></button>
              <button className="icon-btn" onClick={()=>setSel(null)}><I n="x"/></button>
            </div>
          </div>

          {/* Videos */}
          <div>
            <div className="between" style={{marginBottom:8}}>
              <span style={{fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Video ({(phase.videos||[]).length})</span>
              <button className="btn btn-ghost" style={{padding:'4px 9px',fontSize:11}} onClick={()=>setEditItem({isNew:true,type:'video',title:'',url:''})}>+ Tambah</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {(phase.videos||[]).map((v,i)=>(
                <div key={v.id} style={{padding:'8px 10px',borderRadius:7,background:'var(--surface2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:11,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace',width:18,flexShrink:0}}>{i+1}</span>
                  <div style={{flex:1,fontSize:12,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v.title}</div>
                  {v.url&&<a href={v.url} target="_blank" rel="noopener" className="icon-btn" style={{width:24,height:24,flexShrink:0}} onClick={e=>e.stopPropagation()}><I n="play"/></a>}
                  <button className="icon-btn" style={{width:24,height:24,flexShrink:0}} onClick={()=>setEditItem({isNew:false,type:'video',index:i,id:v.id,title:v.title,url:v.url||''})}><I n="pencil"/></button>
                  <button className="icon-btn red" style={{width:24,height:24,flexShrink:0}} onClick={()=>delItem('video',i)}><I n="trash"/></button>
                </div>
              ))}
            </div>
          </div>

          {/* Case studies */}
          <div>
            <div className="between" style={{marginBottom:8}}>
              <span style={{fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Projects ({(phase.casestudies||[]).length})</span>
              <button className="btn btn-ghost" style={{padding:'4px 9px',fontSize:11}} onClick={()=>setEditItem({isNew:true,type:'case',title:'',desc:''})}>+ Tambah</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {(phase.casestudies||[]).map((cs,i)=>(
                <div key={cs.id} style={{padding:'8px 10px',borderRadius:7,background:'var(--surface2)',border:'1px solid var(--border)',display:'flex',alignItems:'flex-start',gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:2}}>{cs.title}</div>
                    {cs.desc&&<div style={{fontSize:11,color:'var(--text2)'}}>{cs.desc}</div>}
                  </div>
                  <button className="icon-btn" style={{width:24,height:24,flexShrink:0}} onClick={()=>setEditItem({isNew:false,type:'case',index:i,id:cs.id,title:cs.title,desc:cs.desc||''})}><I n="pencil"/></button>
                  <button className="icon-btn red" style={{width:24,height:24,flexShrink:0}} onClick={()=>delItem('case',i)}><I n="trash"/></button>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {editPhase&&<Modal open={!!editPhase} onClose={()=>setEditPhase(null)} title={editPhase.isNew?'Tambah Modul':'Edit Modul'}><PhaseForm init={editPhase} onSave={savePhase} onClose={()=>setEditPhase(null)}/></Modal>}
      {editItem&&<Modal open={!!editItem} onClose={()=>setEditItem(null)} title={editItem.isNew?(editItem.type==='video'?'Tambah Video':'Tambah Project'):(editItem.type==='video'?'Edit Video':'Edit Project')}><ItemForm init={editItem} onSave={saveItem} onClose={()=>setEditItem(null)}/></Modal>}
    </div>
  );
};

const ItemForm=({init,onSave,onClose})=>{
  const[title,setTitle]=useState(init.title||'');
  const[url,setUrl]=useState(init.url||'');
  const[desc,setDesc]=useState(init.desc||'');
  const sub=e=>{e.preventDefault();onSave({...init,title,url,desc});};
  return(
    <form onSubmit={sub} style={{display:'flex',flexDirection:'column',gap:12}}>
      <div><span className="label">Judul</span><input value={title} onChange={e=>setTitle(e.target.value)} className="inp" required placeholder={init.type==='video'?'#01 — Intro Python...':'Project: Data Analysis...'}/></div>
      {init.type==='video'&&<div><span className="label">YouTube URL (opsional)</span><input value={url} onChange={e=>setUrl(e.target.value)} className="inp" placeholder="https://youtube.com/..."/></div>}
      {init.type==='case'&&<div><span className="label">Deskripsi Project</span><textarea value={desc} onChange={e=>setDesc(e.target.value)} className="inp" style={{minHeight:70}} placeholder="Buat analisis data..."/></div>}
      <div style={{display:'flex',gap:10,marginTop:4}}><button type="button" onClick={onClose} className="btn btn-ghost" style={{flex:1}}>Batal</button><button type="submit" className="btn btn-blue" style={{flex:2}}>Simpan</button></div>
    </form>
  );
};

const PhaseForm=({init,onSave,onClose})=>{
  const[title,setTitle]=useState(init.title||'');const[week,setWeek]=useState(init.week||'');const[desc,setDesc]=useState(init.desc||'');const[color,setColor]=useState(init.color||'#3b82f6');const[pl,setPl]=useState(init.pl||'');
  const sub=e=>{e.preventDefault();onSave({...init,title,week,desc,color,pl});};
  const cols=['#3b82f6','#0ea5e9','#6366f1','#22c55e','#f59e0b','#ef4444','#8b5cf6'];
  return(<form onSubmit={sub} style={{display:'flex',flexDirection:'column',gap:12}}>
    <div><span className="label">Nama Modul</span><input value={title} onChange={e=>setTitle(e.target.value)} className="inp" required/></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <div><span className="label">Week</span><input value={week} onChange={e=>setWeek(e.target.value)} className="inp" placeholder="1–2"/></div>
      <div><span className="label">Playlist URL</span><input value={pl} onChange={e=>setPl(e.target.value)} className="inp"/></div>
    </div>
    <div><span className="label">Deskripsi</span><textarea value={desc} onChange={e=>setDesc(e.target.value)} className="inp" style={{minHeight:60}}/></div>
    <div><span className="label">Warna</span><div style={{display:'flex',gap:7,marginTop:4}}>{cols.map(c=><div key={c} onClick={()=>setColor(c)} style={{width:26,height:26,borderRadius:7,background:c,cursor:'pointer',border:`2px solid ${color===c?'#fff':'transparent'}`,transform:color===c?'scale(1.15)':'scale(1)',transition:'all 0.15s'}}/>)}</div></div>
    <div style={{display:'flex',gap:10,marginTop:4}}><button type="button" onClick={onClose} className="btn btn-ghost" style={{flex:1}}>Batal</button><button type="submit" className="btn btn-blue" style={{flex:2}}>Simpan</button></div>
  </form>);
};

const WorkoutMgr=({workout,setWorkout})=>{
  const[activeDay,setActiveDay]=useState('Senin');const[editEx,setEditEx]=useState(null);
  const safeWO=typeof workout==='object'&&!Array.isArray(workout)?workout:DEFAULT_WORKOUT;
  const day=safeWO[activeDay]||{type:'',focus:'',exercises:[]};
  const saveMeta=(f,v)=>setWorkout(p=>{const s=typeof p==='object'&&!Array.isArray(p)?p:DEFAULT_WORKOUT;return{...s,[activeDay]:{...day,[f]:v}};});
  const saveEx=data=>{setWorkout(p=>{const s=typeof p==='object'&&!Array.isArray(p)?p:DEFAULT_WORKOUT;const d=s[activeDay]||{exercises:[]};const list=d.exercises||[];if(data.isNew)return{...s,[activeDay]:{...d,exercises:[...list,{name:data.name,detail:data.detail,target:data.target,category:'primary'}]}};return{...s,[activeDay]:{...d,exercises:list.map((e,i)=>i===data.index?{name:data.name,detail:data.detail,target:data.target,category:e.category}:e)}};});setEditEx(null);};
  const delEx=i=>{if(!confirm('Hapus?'))return;setWorkout(p=>{const s=typeof p==='object'&&!Array.isArray(p)?p:DEFAULT_WORKOUT;const d=s[activeDay]||{exercises:[]};const list=[...(d.exercises||[])];list.splice(i,1);return{...s,[activeDay]:{...d,exercises:list}};});};
  const priEx=(day.exercises||[]).filter(e=>e.category==='primary');
  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{DAYS.map(d=><button key={d} className={`day-btn${activeDay===d?' on':''}`} onClick={()=>setActiveDay(d)}>{d}</button>)}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div><span className="label">Tipe Sesi</span><input value={day.type||''} onChange={e=>saveMeta('type',e.target.value)} className="inp" style={{fontSize:12}} placeholder="Push Day..."/></div>
        <div><span className="label">Fokus</span><input value={day.focus||''} onChange={e=>saveMeta('focus',e.target.value)} className="inp" style={{fontSize:12}} placeholder="Dada, Bahu..."/></div>
      </div>
      <div className="between"><span style={{fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Latihan ({priEx.length})</span><button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:11}} onClick={()=>setEditEx({isNew:true,index:-1,name:'',detail:'',target:''})}>+ Tambah</button></div>
      <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:220,overflowY:'auto'}}>
        {priEx.map((ex,i)=>(
          <div key={i} style={{padding:'9px 11px',borderRadius:8,background:'var(--surface2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',gap:9}}>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{ex.name}</div><div style={{fontSize:11,color:'var(--text2)',fontFamily:'JetBrains Mono,monospace'}}>{ex.detail} — {ex.target}</div></div>
            <button className="icon-btn" onClick={()=>setEditEx({isNew:false,index:i,...ex})}><I n="pencil"/></button>
            <button className="icon-btn red" onClick={()=>delEx(i)}><I n="trash"/></button>
          </div>
        ))}
      </div>
      {editEx&&<Modal open={!!editEx} onClose={()=>setEditEx(null)} title={editEx.isNew?'Tambah Gerakan':'Edit Gerakan'}><ExForm init={editEx} onSave={saveEx} onClose={()=>setEditEx(null)}/></Modal>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
